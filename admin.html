<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | NursingEd</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 p-6">

    <div class="max-w-xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-xl border border-blue-100">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Add New Lecture (Free Mode)</h2>
        
        <form id="uploadForm" class="space-y-4">
            <select id="stage" class="w-full p-4 bg-gray-50 rounded-xl border-none outline-none focus:ring-2 focus:ring-blue-500">
                <option value="1">Stage One</option>
                <option value="2">Stage Two</option>
                <option value="3">Stage Three</option>
                <option value="4">Stage Four</option>
            </select>
            
<!-- Category Selection -->
<div>
    <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Content Category</label>
    <select id="category" class="w-full p-4 bg-gray-50 rounded-xl border-none outline-none focus:ring-2 focus:ring-blue-500">
        <option value="first course">first course</option>
        <option value="second course">second course</option>
    </select>
</div>
            <input type="text" id="subject" placeholder="Subject (e.g. Anatomy)" class="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 border-none">
            <input type="text" id="title" placeholder="Lecture Title" class="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 border-none">
            <input type="text" id="videoUrl" placeholder="YouTube Video Link" class="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 border-none">
            
            <!-- Link to Google Drive PDF instead of uploading -->
            <input type="text" id="pdfUrl" placeholder="Paste Google Drive PDF Link Here" class="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 border-none text-blue-600">
            
            <p class="text-[10px] text-gray-400 px-2 leading-tight">
                * Upload PDF to Google Drive, set sharing to "Anyone with link", and paste link above.
            </p>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100">
                Publish to App
            </button>
        </form>
    </div>
    <div class="max-w-xl mx-auto bg-white p-8 rounded-[2.5rem] shadow-xl border border-purple-100 mt-10">
    <h2 class="text-2xl font-bold text-gray-800 mb-6"><i class="fas fa-question-circle text-purple-600 mr-2"></i> Question of the Day</h2>
    
    <form id="qForm" class="space-y-4">
        <textarea id="qText" placeholder="The Question..." class="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-purple-500 border-none h-24"></textarea>
        
        <input type="text" id="optA" placeholder="Option A" class="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-purple-500 border-none">
        <input type="text" id="optB" placeholder="Option B" class="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-purple-500 border-none">
        
        <select id="correctOpt" class="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-purple-500 border-none">
            <option value="A">A is Correct</option>
            <option value="B">B is Correct</option>
        </select>

        <textarea id="rationale" placeholder="Why is this correct? (Rationale)" class="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-2 focus:ring-purple-500 border-none h-20"></textarea>
        
        <button type="submit" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-purple-100 transition hover:bg-purple-700">
            Update Daily Question
        </button>
    </form>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 1. Your Connection Config
  const firebaseConfig = {
    apiKey: "AIzaSyAtVtGxnJK1SM2qZ7uJVHduEcLwu2KtBWU",
    authDomain: "nursinged-network.firebaseapp.com",
    projectId: "nursinged-network",
    storageBucket: "nursinged-network.firebasestorage.app",
    messagingSenderId: "484119290839",
    appId: "1:123456789:web:abcdef..." 
  };

  // 2. Initialize Firebase and define 'db'
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 3. LOGIC FOR LECTURE FORM
  const uploadForm = document.getElementById('uploadForm');
  if (uploadForm) {
      uploadForm.onsubmit = async (e) => {
          e.preventDefault();
          try {
              await addDoc(collection(db, "first course"), {
                  stage: document.getElementById('stage').value,
                  category: document.getElementById('category').value,
                  subject: document.getElementById('subject').value,
                  title: document.getElementById('title').value,
                  videoUrl: document.getElementById('videoUrl').value,
                  pdfUrl: document.getElementById('pdfUrl').value,
                  createdAt: new Date()
              });
              alert("تم رفع المحاضرة بنجاح!");
              uploadForm.reset();
          } catch (err) { alert("Error: " + err.message); }
      };
  }

  // 4. LOGIC FOR DAILY QUESTION FORM
  const qForm = document.getElementById('qForm');
  if (qForm) {
      qForm.onsubmit = async (e) => {
          e.preventDefault();
          try {
              // Now 'db' is correctly defined here
              await addDoc(collection(db, "dailyQuestions"), {
                  question: document.getElementById('qText').value,
                  optionA: document.getElementById('optA').value,
                  optionB: document.getElementById('optB').value,
                  correct: document.getElementById('correctOpt').value,
                  rationale: document.getElementById('rationale').value,
                  createdAt: new Date()
              });
              alert("تم تحديث سؤال اليوم بنجاح!");
              qForm.reset();
          } catch (err) { alert("Error: " + err.message); }
      };
  }
</script>

</body>
</html>
