<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NursingEd.Network | منصة تمريض</title>
    
    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Cairo', sans-serif; }
        .stage-card:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center space-x-reverse space-x-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white"><i class="fas fa-heartbeat"></i></div>
            <span class="text-xl font-bold text-blue-900">NursingEd.Network</span>
        </div>
        <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold">أ ك</div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        
        <!-- Action Button: Install -->
        <div id="install-banner" class="hidden mb-6 bg-blue-600 text-white p-4 rounded-2xl flex justify-between items-center">
            <p class="font-bold">ثبت التطبيق على هاتفك للوصول السريع!</p>
            <button id="install-btn" class="bg-white text-blue-600 px-4 py-2 rounded-xl font-bold text-sm">تثبيت الآن</button>
        </div>

        <header class="mb-10 text-right">
            <h1 class="text-3xl font-extrabold text-gray-900">أهلاً بك ممرض المستقبل 👋</h1>
            <p class="text-gray-500">اختر مرحلتك الدراسية للبدء</p>
        </header>

        <!-- Stages -->
        <div class="grid grid-cols-1 gap-6">
            <div class="stage-card bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <h3 class="text-xl font-bold text-gray-800">المرحلة الأولى</h3>
                        <p class="text-sm text-gray-500">أساسيات التمريض والتشريح</p>
                    </div>
                    <div class="text-blue-600 bg-blue-50 p-3 rounded-2xl"><i class="fas fa-book-medical fa-2x"></i></div>
                </div>
            </div>
            <!-- Add more stages similarly -->
        </div>

    </main>

    <script>
        // Logic to show a manual "Install" button
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');
        const installBtn = document.getElementById('install-btn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.classList.remove('hidden');
        });

        installBtn.addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        installBanner.classList.add('hidden');
                    }
                    deferredPrompt = null;
                });
            }
        });
    </script>
</body>
</html>
