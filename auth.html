<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NursingEd.Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #eff6ff 0%, #ffffff 100%); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="w-full max-w-md p-8 bg-white rounded-[2.5rem] shadow-2xl border border-blue-50 mx-4">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-16 h-16 rounded-2xl text-white flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-200">
                <i class="fas fa-user-md fa-2x"></i>
            </div>
            <h1 class="text-2xl font-black text-gray-800">NursingEd<span class="text-blue-600">.Network</span></h1>
            <p class="text-gray-400 text-sm mt-1">Empowering Future Caregivers</p>
        </div>

        <!-- Tabs -->
        <div class="flex mb-8 bg-gray-100 p-1 rounded-2xl">
            <button id="loginTab" class="w-1/2 py-2 text-sm font-bold rounded-xl bg-white shadow-sm text-blue-600">Login</button>
            <button id="signupTab" class="w-1/2 py-2 text-sm font-bold rounded-xl text-gray-500">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase ml-1 mb-1">Email Address</label>
                <input type="email" placeholder="nurse@college.edu" class="w-full p-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase ml-1 mb-1">Password</label>
                <input type="password" placeholder="••••••••" class="w-full p-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">
                Access Dashboard
            </button>
        </form>

        <!-- Signup Form (Hidden by Default) -->
        <form id="signupForm" class="space-y-4 hidden">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase ml-1 mb-1">Full Name</label>
                <input type="text" placeholder="John Doe" class="w-full p-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase ml-1 mb-1">Stage</label>
                <select class="w-full p-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-blue-500 outline-none transition appearance-none">
                    <option>Stage One</option>
                    <option>Stage Two</option>
                    <option>Stage Three</option>
                    <option>Stage Four</option>
                </select>
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase ml-1 mb-1">Email</label>
                <input type="email" placeholder="nurse@college.edu" class="w-full p-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase ml-1 mb-1">Create Password</label>
                <input type="password" placeholder="••••••••" class="w-full p-4 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition">
                Create Account
            </button>
        </form>

        <p class="text-center text-xs text-gray-400 mt-6">
            By continuing, you agree to the Clinical Terms of Service.
        </p>
    </div>

    <script>
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');

        loginTab.onclick = () => {
            loginTab.className = "w-1/2 py-2 text-sm font-bold rounded-xl bg-white shadow-sm text-blue-600";
            signupTab.className = "w-1/2 py-2 text-sm font-bold rounded-xl text-gray-500";
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
        }

        signupTab.onclick = () => {
            signupTab.className = "w-1/2 py-2 text-sm font-bold rounded-xl bg-white shadow-sm text-blue-600";
            loginTab.className = "w-1/2 py-2 text-sm font-bold rounded-xl text-gray-500";
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
        }
    </script>

</body>
</html>
