<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المرحلة الرابعة | NursingEd.Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Cairo', sans-serif; }
        .tab-active { background-color: #2563eb !important; color: white !important; box-shadow: 0 10px 15px rgba(37,99,235,0.2); }
    </style>
</head>
<body>

    <nav class="bg-white border-b p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center text-blue-600">
            <a href="index.html" class="font-bold"><i class="fas fa-arrow-right"></i> رجوع</a>
            <h1 class="text-xl font-extrabold text-gray-800">المرحلة الرابعة</h1>
            <div class="w-10"></div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <!-- Tab Buttons -->
        <div class="flex bg-gray-200 p-1 rounded-3xl mb-8">
            <button onclick="loadContent('first course')" id="btn-first" class="w-1/2 py-4 rounded-[1.5rem] font-bold transition-all">الكورس الأول</button>
            <button onclick="loadContent('second course')" id="btn-second" class="w-1/2 py-4 rounded-[1.5rem] font-bold text-gray-500 transition-all">الكورس الثاني</button>
        </div>

        <div id="list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAtVtGxnJK1SM2qZ7uJVHduEcLwu2KtBWU",
            authDomain: "nursinged-network.firebaseapp.com",
            projectId: "nursinged-network",
            storageBucket: "nursinged-network.firebasestorage.app",
            messagingSenderId: "484119290839",
            appId: "1:484119290839:web:1e56aadb970df919426192"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.loadContent = async (cat) => {
            // Update Tab UI
            const firstBtn = document.getElementById('btn-first');
            const secondBtn = document.getElementById('btn-second');
            
            if(cat === 'first course') {
                firstBtn.classList.add('tab-active');
                secondBtn.classList.remove('tab-active');
                secondBtn.classList.add('text-gray-500');
            } else {
                secondBtn.classList.add('tab-active');
                firstBtn.classList.remove('tab-active');
                firstBtn.classList.add('text-gray-500');
            }

            const container = document.getElementById('list');
            container.innerHTML = "<p class='text-center col-span-2 text-gray-400 py-10'>جاري التحميل...</p>";

            try {
                // FIXED: collection matches admin (lectures)
                const q = query(collection(db, "lectures"), where("stage", "==", "4"));
                const snapshot = await getDocs(q);
                container.innerHTML = "";

                let found = false;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.category === cat) {
                        found = true;
                        // FIXED: Using proper Backticks ``
                        container.innerHTML += `
                            <div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm">
                                <span class="text-[10px] font-bold text-blue-500 bg-blue-50 px-3 py-1 rounded-full uppercase">${data.subject}</span>
                                <h3 class="text-lg font-bold text-gray-800 mt-3">${data.title}</h3>
                                <div class="mt-6 flex gap-2">
                                    ${data.videoUrl ? `<a href="${data.videoUrl}" target="_blank" class="flex-1 bg-gray-900 text-white py-3 rounded-2xl text-center text-xs font-bold">فيديو</a>` : ''}
                                    <a href="${data.pdfUrl}" target="_blank" class="flex-1 border-2 border-gray-100 py-3 rounded-2xl text-center text-xs font-bold text-gray-700 font-bold">PDF الملف</a>
                                </div>
                            </div>
                        `;
                    }
                });
                if(!found) container.innerHTML = "<p class='text-center col-span-2 text-gray-400 py-10'>لا يوجد محتوى هنا بعد.</p>";
            } catch (e) { alert(e.message); }
        };

        window.onload = () => loadContent('first course');
    </script>
</body>
</html>
