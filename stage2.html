<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المرحلة الثانية | NursingEd.Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8fafc; font-family: 'Cairo', sans-serif; }
        .tab-active { background-color: #2563eb; color: white; box-shadow: 0 10px 15px rgba(37,99,235,0.2); }
    </style>
</head>
<body>

    <nav class="bg-white border-b p-4 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center text-blue-600">
            <a href="index.html" class="font-bold"><i class="fas fa-arrow-right"></i> رجوع</a>
            <h1 class="text-xl font-extrabold text-gray-800">المرحلة الثانية</h1>
            <div class="w-10"></div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        
        <!-- Tab Buttons (The two parts) -->
        <div class="flex bg-gray-200 p-1 rounded-3xl mb-8">
            <button onclick="loadContent('lecture')" id="btn-lecture" class="tab-active w-1/2 py-4 rounded-[1.5rem] font-bold">المحاضرات</button>
            <button onclick="loadContent('ministry')" id="btn-ministry" class="w-1/2 py-4 rounded-[1.5rem] font-bold text-gray-500">الأسئلة الوزارية</button>
        </div>

        <div id="list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Firebase items load here -->
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAtVtGxnJK1SM2Qz7uJVHduEclWu2KtBWU",
  authDomain: "nursinged-network.firebaseapp.com",
  projectId: "nursinged-network",
  storageBucket: "nursinged-network.firebasestorage.app",
  messagingSenderId: "484119290839",
  appId: "1:484119290839:web:1e56aadb970df919426192",
  measurementId: "G-GC7737EJEY" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.loadContent = async (cat) => {
            // Update Tab Colors
            document.getElementById('btn-lecture').className = cat == 'lecture' ? 'tab-active w-1/2 py-4 rounded-[1.5rem] font-bold' : 'w-1/2 py-4 rounded-[1.5rem] font-bold text-gray-500';
            document.getElementById('btn-ministry').className = cat == 'ministry' ? 'tab-active w-1/2 py-4 rounded-[1.5rem] font-bold' : 'w-1/2 py-4 rounded-[1.5rem] font-bold text-gray-500';

            const container = document.getElementById('list');
            container.innerHTML = "<p class='text-center col-span-2 text-gray-400'>جاري التحميل...</p>";

            const q = query(collection(db, "lectures"), where("stage", "==", "2"), where("category", "==", cat));
            const snapshot = await getDocs(q);
            container.innerHTML = "";

            snapshot.forEach((doc) => {
                const data = doc.data();
                container.innerHTML += `
                    <div class="bg-white p-6 rounded-[2rem] border border-gray-100 shadow-sm">
                        <span class="text-[10px] font-bold text-blue-500 bg-blue-50 px-3 py-1 rounded-full uppercase">${data.subject}</span>
                        <h3 class="text-lg font-bold text-gray-800 mt-3">${data.title}</h3>
                        <div class="mt-6 flex gap-2">
                            ${data.videoUrl ? `<a href="${data.videoUrl}" class="flex-1 bg-gray-900 text-white py-3 rounded-2xl text-center text-xs font-bold">فيديو</a>` : ''}
                            <a href="${data.pdfUrl}" class="flex-1 border-2 border-gray-100 py-3 rounded-2xl text-center text-xs font-bold text-gray-700">PDF الملف</a>
                        </div>
                    </div>
                `;
            });
        }
        window.onload = () => loadContent('lecture');
    </script>
</body>
</html>
